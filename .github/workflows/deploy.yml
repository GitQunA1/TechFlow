name: Tự động Deploy TechFlow

on:
  push:
    branches: [ "feat/uploadfile_sever" ]

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Bước 1 - Tải code mới nhất về Server
        uses: actions/checkout@v4

      - name: Bước 2 - Build Backend (.NET)
        run: |
          cd techflow_be/MinimalAPIs
          dotnet restore
          dotnet publish -c Release -o out

      - name: Bước 3 - Build Frontend (Next.js)
        run: |
          cd techflow_fe
          npm install
          npm run build

      - name: Bước 4 - Chạy website ngầm bằng PM2
        continue-on-error: true
        run: |
          # Xóa tiến trình cũ (nếu có)
          pm2 delete techflow-backend
          pm2 delete techflow-frontend
          
          # Bật lại Backend từ đúng thư mục MinimalAPIs
          cd techflow_be/MinimalAPIs
          pm2 start "dotnet out/MinimalAPIs.dll" --name "techflow-backend"
          
          # Đi ngược ra ngoài và vào lại thư mục Frontend để bật
          cd ../../techflow_fe
          pm2 start npm --name "techflow-frontend" -- run start
          
          # Lưu trạng thái
          pm2 save