name: Tự động Deploy TechFlow

on:
  push:
    branches: [ "feat/uploadfile_sever" ]

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Bước 1 - Tải code mới nhất về Server
        uses: actions/checkout@v4

      - name: Bước 2 - Chuẩn bị biến môi trường và Build Frontend (Next.js)
        run: |
          # Copy file .env từ vùng dùng chung vào thư mục Frontend
          copy "C:\TechFlow_Secrets\.env" "techflow_fe\.env"
          
          cd techflow_fe
          npm install
          npm run build

      - name: Bước 3 - Build Backend (.NET) và nạp cấu hình bí mật
        run: |
          cd techflow_be/MinimalAPIs
          dotnet restore
          dotnet publish -c Release -o out
          
          # Copy file appsettings.json từ vùng dùng chung vào thư mục 'out'
          copy "C:\TechFlow_Secrets\appsettings.json" "out\appsettings.json"

      - name: Bước 4 - Chạy website ngầm bằng PM2
        run: |
          pm2 delete techflow-backend || true
          pm2 delete techflow-frontend || true
          
          # Bật lại Backend
          cd techflow_be/MinimalAPIs
          pm2 start dotnet --name "techflow-backend" -- out/MinimalAPIs.dll --urls="http://*:10114"
          
          # Bật lại Frontend
          cd ../../techflow_fe
          pm2 start npm --name "techflow-frontend" -- run start -- -H 0.0.0.0 -p 10115
          
          pm2 save