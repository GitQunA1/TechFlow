name: Tự động Deploy TechFlow

on:
  push:
    branches: [ "feat/uploadfile_sever" ]

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Bước 0 - Dừng tất cả tiến trình PM2 trước khi checkout
        continue-on-error: true
        run: |
          pm2 delete all
          pm2 flush
          pm2 save --force
          timeout /t 3
        shell: cmd

      - name: Bước 1 - Tải code mới nhất về Server
        uses: actions/checkout@v4

      - name: Bước 2 - Chuẩn bị biến môi trường và Build Frontend (Next.js)
        run: |
          copy "C:\TechFlow_Secrets\.env" "%GITHUB_WORKSPACE%\techflow_fe\.env"
          cd /d "%GITHUB_WORKSPACE%\techflow_fe"
          npm install
          npm run build
          dir .next\BUILD_ID
        shell: cmd

      - name: Bước 3 - Build Backend (.NET) và nạp cấu hình bí mật
        run: |
          cd techflow_be\MinimalAPIs
          dotnet restore
          dotnet publish -c Release -o out
          copy /Y "C:\TechFlow_Secrets\appsettings.json" "%CD%\out\appsettings.json"
        shell: cmd

      - name: Bước 4.1 - Dọn dẹp tiến trình cũ
        continue-on-error: true
        run: |
          pm2 delete all
          pm2 flush
          pm2 save --force
          timeout /t 2
        shell: cmd

      - name: Bước 4.2 - Khởi động Backend
        run: |
          pm2 start dotnet --name "techflow-backend" --cwd "%GITHUB_WORKSPACE%\techflow_be\MinimalAPIs\out" -- MinimalAPIs.dll --urls="http://*:10114"
          pm2 list
        shell: cmd

      - name: Bước 4.3 - Khởi động Frontend
        run: |
          pm2 start node --name "techflow-frontend" --cwd "%GITHUB_WORKSPACE%\techflow_fe" -- node_modules/next/dist/bin/next start -H 0.0.0.0 -p 10115
          pm2 save
          pm2 list
        shell: cmd

      - name: Bước 5 - Kiểm tra tiến trình thực sự đang sống
        run: |
          ping -n 9 127.0.0.1 > nul
          pm2 list
          netstat -ano | findstr "10114"
          netstat -ano | findstr "10115"
          curl.exe --fail http://localhost:10115
          curl.exe --fail http://localhost:10114/swagger/index.html
        shell: cmd